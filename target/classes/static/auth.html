<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>KPI News | Join the Community</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root { --primary: #007AFF; --dark: #1D1D1F; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .auth-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.3); }
        .tabs { display: flex; gap: 20px; margin-bottom: 30px; }
        .tab { font-size: 1.2rem; font-weight: 700; color: #888; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--dark); border-bottom: 3px solid var(--primary); }
        .form-group { margin-bottom: 20px; display: none; }
        .form-group.active { display: block; }
        input, textarea { width: 100%; padding: 14px; margin-top: 8px; border: 1px solid #ddd; border-radius: 12px; background: rgba(255,255,255,0.5); font-size: 1rem; }
        .btn-main { width: 100%; padding: 16px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .role-selector { display: flex; gap: 10px; margin: 15px 0; }
        .role-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; font-size: 0.8rem; background: white; }
        .role-btn.active { border-color: var(--primary); background: rgba(0,122,255,0.05); font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="tabs">
            <div class="tab active" id="tabLogin">Вхід</div>
            <div class="tab" id="tabReg">Реєстрація</div>
        </div>

        <div id="loginGroup" class="form-group active">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button class="btn-main" id="btnLogin">Увійти</button>
        </div>

        <div id="regGroup" class="form-group">
            <input type="text" id="regName" placeholder="Повне Ім'я">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass" placeholder="Пароль">
            <div class="role-selector">
                <button class="role-btn active" id="btnReader">👁️ Глядач</button>
                <button class="role-btn" id="btnCreator">✍️ Автор</button>
            </div>
            <textarea id="regBio" placeholder="Про себе (Відеограф, блогер...)"></textarea>
            <button class="btn-main" id="btnRegister">Створити аккаунт</button>
        </div>
        
        <a href="/" style="display:block; text-align:center; margin-top:20px; color:#666; text-decoration:none;">← На головну</a>
    </div>

    <script type="module" src="js/auth-page.js"></script>
</body>
</html>
