spring.application.name=web-news-application

# PostgreSQL (???????? ??? ?????? ? Neon Cloud)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring settings
spring.mvc.favicon.enabled=false

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false

# Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# OpenWeather
openweathermap.api.key=${OPENWEATHER_API_KEY}
openweathermap.api.url=https://api.openweathermap.org/data/2.5/weather?q={city}&appid={key}&units=metric&lang=uk

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Cloudinary
cloudinary.cloud.name=dkrqqrqnm
cloudinary.api.key=845942476428237
cloudinary.api.secret=${CLOUDINARY_API_SECRET}

# Render Port Binding
server.port=${PORT:8080}