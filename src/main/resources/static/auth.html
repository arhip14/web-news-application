<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>KPI News | Join the Community</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary: #CC0000; /* USNews Red */
            --dark: #1A1A1A;
            --bg: #F4F4F9;
            --border: #EAEAEA;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
        }

        .auth-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 0; /* Строгі журнальні кути */
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            border-top: 4px solid var(--primary); /* Акцентна червона лінія */
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .tab {
            font-size: 1.2rem;
            font-weight: 800;
            color: #aaaaaa;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .tab.active {
            color: var(--dark);
            border-bottom: 3px solid var(--primary);
            padding-bottom: 11px;
            margin-bottom: -12px; /* Накладання на нижню лінію */
        }

        .form-group { margin-bottom: 20px; display: none; }
        .form-group.active { display: block; }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #fafafa;
            font-size: 14px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--dark);
            background: #fff;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            font-size: 14px;
        }

        .btn-main:hover { background: var(--primary); }

        .role-selector { display: flex; gap: 10px; margin: 15px 0; }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            background: #fafafa;
            color: #777;
            text-transform: uppercase;
            font-weight: 600;
        }

        .role-btn.active {
            border-color: var(--dark);
            background: var(--dark);
            color: white;
        }

        .btn-send-mini {
            background: #eaeaea;
            color: var(--dark);
            border: none;
            padding: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-send-mini:hover { background: var(--border); }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="tabs">
        <div class="tab active" id="tabLogin">Вхід</div>
        <div class="tab" id="tabReg">Реєстрація</div>
    </div>

    <div id="loginGroup" class="form-group active">
        <input type="email" id="loginEmail" placeholder="Email адреса">
        <input type="password" id="loginPass" placeholder="Пароль">
        <button class="btn-main" id="btnLogin">Увійти</button>
    </div>

    <div id="regGroup" class="form-group">
        <input type="text" id="regName" placeholder="Повне ім'я">
        <input type="email" id="regEmail" placeholder="Email адреса">
        <input type="password" id="regPass" placeholder="Пароль">

        <!-- БЛОК АВАТАРА ДЛЯ РЕЄСТРАЦІЇ -->
        <label style="font-size:12px; font-weight:700; color:var(--dark); text-transform:uppercase; margin-top:15px; display:block;">Фото профілю (необов'язково)</label>
        <div style="display:flex; gap:15px; margin-bottom:15px; margin-top:8px; align-items:center; background:#fafafa; padding:10px; border:1px solid var(--border); border-radius:4px;">
            <img id="regPreviewAvatar" src="https://ui-avatars.com/api/?name=User&background=f0f0f2" style="width:55px; height:55px; border-radius:50%; object-fit:cover; border:2px solid #ddd;">
            <div style="flex:1;">
                <div style="display:flex; gap:8px;">
                    <button type="button" class="btn-send-mini" style="flex:1;" onclick="window.generateRegAvatar()">🎲 Випадкове</button>
                    <label class="btn-send-mini" style="flex:1; cursor:pointer; text-align:center;">
                        📁 З ПК
                        <input type="file" style="display:none;" accept="image/png, image/jpeg, image/webp" onchange="window.uploadRegAvatar(this)">
                    </label>
                </div>
                <input type="hidden" id="regAvatarUrl">
            </div>
        </div>

        <label style="font-size:12px; font-weight:700; color:var(--dark); text-transform:uppercase; margin-top:10px; display:block;">Оберіть роль</label>
        <div class="role-selector">
            <button class="role-btn active" id="btnReader">Глядач</button>
            <button class="role-btn" id="btnCreator">Автор</button>
        </div>

        <textarea id="regBio" placeholder="Коротка біографія (діяльність, інтереси...)"></textarea>
        <button class="btn-main" id="btnRegister">Створити акаунт</button>
    </div>

    <a href="/" style="display:block; text-align:center; margin-top:25px; color:#888; text-decoration:none; font-size: 13px; font-weight: 600; text-transform: uppercase;">← Повернутися на головну</a>
</div>

<script type="module" src="js/auth-page.js"></script>
</body>
</html>
